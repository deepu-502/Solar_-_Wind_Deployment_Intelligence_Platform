version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: solar_wind_db
    environment:
      - POSTGRES_DB=solar_wind_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
